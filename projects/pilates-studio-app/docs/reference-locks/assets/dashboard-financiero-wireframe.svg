<svg xmlns="http://www.w3.org/2000/svg" width="420" height="860" viewBox="0 0 420 860" font-family="'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif">
  <!-- StudioFlow · Dashboard financiero (admin) — wireframe low-fi, dirección cálida boutique -->
  <!-- Paleta: arena #FBF7F2 · card #FFF · borde #E7DED3 · texto #3F3A34 / muted #8A8178 -->
  <!-- acento estudio #C8775A · verde #5E8B6A · ámbar #C99A3B · rojo suave #C2675F -->
  <defs>
    <style>
      .t{fill:#3F3A34}.m{fill:#8A8178}.w{fill:#fff}.card{fill:#fff;stroke:#E7DED3}
      .lbl{font-size:12px}.sm{font-size:11px}.big{font-weight:700}
    </style>
  </defs>

  <!-- marco mobile -->
  <rect x="6" y="6" width="408" height="848" rx="34" fill="#FBF7F2" stroke="#E7DED3" stroke-width="2"/>
  <rect x="160" y="20" width="100" height="8" rx="4" fill="#EDE4D8"/>

  <!-- header -->
  <text x="32" y="64" class="t big" font-size="17">Estudio Reforma</text>
  <text x="32" y="82" class="m sm">Panel · junio 2026</text>
  <circle cx="388" cy="62" r="14" fill="#F0E9E0" stroke="#E7DED3"/>

  <!-- hero: ingresos del mes -->
  <rect x="24" y="100" width="372" height="118" rx="16" class="card"/>
  <rect x="24" y="100" width="6" height="118" rx="3" fill="#C8775A"/>
  <text x="44" y="128" class="m lbl">Ingresos del mes</text>
  <text x="44" y="170" class="t" font-size="38" font-weight="700">$ 842.500</text>
  <text x="44" y="196" class="m sm">Total del año  ·  $ 4.120.000</text>
  <text x="320" y="128" fill="#5E8B6A" class="sm">▲ 12%</text>

  <!-- KPIs: al día / con deuda -->
  <rect x="24" y="232" width="180" height="86" rx="14" class="card"/>
  <circle cx="48" cy="262" r="6" fill="#5E8B6A"/>
  <text x="64" y="266" class="m sm">Al día</text>
  <text x="44" y="300" class="t big" font-size="28">24</text>

  <rect x="216" y="232" width="180" height="86" rx="14" class="card"/>
  <circle cx="240" cy="262" r="6" fill="#C2675F"/>
  <text x="256" y="266" class="m sm">Con deuda</text>
  <text x="236" y="300" class="t big" font-size="28">5</text>

  <!-- acciones rápidas -->
  <rect x="24" y="334" width="180" height="46" rx="12" fill="#C8775A"/>
  <text x="114" y="362" text-anchor="middle" class="w lbl big">Registrar pago</text>
  <rect x="216" y="334" width="180" height="46" rx="12" fill="#fff" stroke="#C8775A"/>
  <text x="306" y="362" text-anchor="middle" fill="#C8775A" class="lbl big">Nueva clase</text>

  <!-- ocupación semana -->
  <rect x="24" y="396" width="372" height="120" rx="14" class="card"/>
  <text x="44" y="424" class="t lbl big">Ocupación de la semana</text>
  <text x="352" y="424" class="m sm">78%</text>
  <g>
    <rect x="44" y="492" width="36" height="-44" fill="#E4D8C8"/>
    <rect x="44" y="492" width="36" height="-30" fill="#C8775A"/>
    <rect x="92" y="492" width="36" height="-52" fill="#E4D8C8"/>
    <rect x="92" y="492" width="36" height="-44" fill="#C8775A"/>
    <rect x="140" y="492" width="36" height="-38" fill="#E4D8C8"/>
    <rect x="140" y="492" width="36" height="-22" fill="#C8775A"/>
    <rect x="188" y="492" width="36" height="-56" fill="#E4D8C8"/>
    <rect x="188" y="492" width="36" height="-50" fill="#C8775A"/>
    <rect x="236" y="492" width="36" height="-46" fill="#E4D8C8"/>
    <rect x="236" y="492" width="36" height="-34" fill="#C8775A"/>
    <rect x="284" y="492" width="36" height="-30" fill="#E4D8C8"/>
    <rect x="284" y="492" width="36" height="-18" fill="#C8775A"/>
    <rect x="332" y="492" width="36" height="-24" fill="#E4D8C8"/>
    <rect x="332" y="492" width="36" height="-12" fill="#C8775A"/>
  </g>
  <text x="44" y="508" class="m" font-size="9">L  M  M  J  V  S  D</text>

  <!-- por vencer -->
  <rect x="24" y="532" width="372" height="92" rx="14" class="card"/>
  <text x="44" y="558" class="t lbl big">Por vencer</text>
  <line x1="24" y1="572" x2="396" y2="572" stroke="#F0E9E0"/>
  <circle cx="48" cy="590" r="5" fill="#C99A3B"/>
  <text x="64" y="594" class="t sm">Lucía P. · membresía</text>
  <text x="372" y="594" text-anchor="end" class="m sm">3 días</text>
  <circle cx="48" cy="612" r="5" fill="#C99A3B"/>
  <text x="64" y="616" class="t sm">Marco D. · pack 8</text>
  <text x="372" y="616" text-anchor="end" class="m sm">1 clase</text>

  <!-- clases de hoy -->
  <rect x="24" y="640" width="372" height="178" rx="14" class="card"/>
  <text x="44" y="666" class="t lbl big">Clases de hoy</text>
  <line x1="24" y1="680" x2="396" y2="680" stroke="#F0E9E0"/>
  <text x="44" y="704" class="t sm big">08:00</text>
  <text x="104" y="704" class="t sm">Reformer</text>
  <rect x="316" y="692" width="56" height="20" rx="10" fill="#EAF1EB"/>
  <text x="344" y="706" text-anchor="middle" fill="#5E8B6A" font-size="10">6/8</text>
  <text x="44" y="736" class="t sm big">10:00</text>
  <text x="104" y="736" class="t sm">Mat</text>
  <rect x="316" y="724" width="56" height="20" rx="10" fill="#FAF1DD"/>
  <text x="344" y="738" text-anchor="middle" fill="#C99A3B" font-size="10">7/8</text>
  <text x="44" y="768" class="t sm big">18:00</text>
  <text x="104" y="768" class="t sm">Reformer</text>
  <rect x="312" y="756" width="60" height="20" rx="10" fill="#F6E7E5"/>
  <text x="342" y="770" text-anchor="middle" fill="#C2675F" font-size="10">Lleno</text>
  <text x="44" y="800" class="t sm big">19:30</text>
  <text x="104" y="800" class="t sm">Mat</text>
  <rect x="316" y="788" width="56" height="20" rx="10" fill="#EAF1EB"/>
  <text x="344" y="802" text-anchor="middle" fill="#5E8B6A" font-size="10">4/8</text>

  <text x="210" y="846" text-anchor="middle" class="m" font-size="9">wireframe low-fi · no es diseño final · status candidate-for-owner-review</text>
</svg>
