<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="680" viewBox="0 0 1000 680" font-family="'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif">
  <!-- StudioFlow · Admin "Crear/gestionar clases" — wireframe low-fi (desktop 2-col) -->
  <!-- arena #FBF7F2 · card #FFF · borde #E7DED3 · texto #3F3A34 / muted #8A8178 · acento #C8775A -->
  <defs><style>
    .t{fill:#3F3A34}.m{fill:#8A8178}.w{fill:#fff}.card{fill:#fff;stroke:#E7DED3}
    .sm{font-size:12px}.xs{font-size:11px}.big{font-weight:700}
  </style></defs>

  <rect x="0" y="0" width="1000" height="680" fill="#FBF7F2"/>

  <!-- header -->
  <text x="40" y="50" class="m sm">Estudio Reforma · admin</text>
  <text x="40" y="78" class="t big" font-size="24">Clases</text>
  <rect x="800" y="40" width="160" height="44" rx="12" fill="#C8775A"/>
  <text x="880" y="68" text-anchor="middle" class="w sm big">+  Nueva clase</text>

  <!-- ===== columna principal: grilla por día ===== -->
  <text x="40" y="120" class="t sm big">Lunes</text>
  <g>
    <rect x="40" y="132" width="560" height="64" rx="14" class="card"/>
    <text x="62" y="170" class="t big" font-size="20">18:00</text>
    <text x="150" y="160" class="t sm big">Reformer</text>
    <text x="150" y="178" class="m xs">con Caro · Cupo 8</text>
    <rect x="360" y="150" width="78" height="22" rx="11" fill="#F0E9E0"/>
    <text x="399" y="165" text-anchor="middle" class="m" font-size="10">Recurrente</text>
    <rect x="470" y="150" width="62" height="26" rx="8" fill="#fff" stroke="#E7DED3"/>
    <text x="501" y="167" text-anchor="middle" class="t" font-size="10">Editar</text>
    <text x="552" y="170" class="m" font-size="16">⋯</text>
  </g>
  <text x="40" y="232" class="t sm big">Miércoles</text>
  <g>
    <rect x="40" y="244" width="560" height="64" rx="14" class="card"/>
    <text x="62" y="282" class="t big" font-size="20">10:00</text>
    <text x="150" y="272" class="t sm big">Mat</text>
    <text x="150" y="290" class="m xs">con Meli · Cupo 10</text>
    <rect x="360" y="262" width="78" height="22" rx="11" fill="#F0E9E0"/>
    <text x="399" y="277" text-anchor="middle" class="m" font-size="10">Recurrente</text>
    <rect x="470" y="262" width="62" height="26" rx="8" fill="#fff" stroke="#E7DED3"/>
    <text x="501" y="279" text-anchor="middle" class="t" font-size="10">Editar</text>
    <text x="552" y="282" class="m" font-size="16">⋯</text>
  </g>
  <g>
    <rect x="40" y="318" width="560" height="64" rx="14" class="card"/>
    <text x="62" y="356" class="t big" font-size="20">19:30</text>
    <text x="150" y="346" class="t sm big">Reformer</text>
    <text x="150" y="364" class="m xs">con Caro · Cupo 6</text>
    <rect x="360" y="336" width="50" height="22" rx="11" fill="#F0E9E0"/>
    <text x="385" y="351" text-anchor="middle" class="m" font-size="10">Única</text>
    <rect x="470" y="336" width="62" height="26" rx="8" fill="#fff" stroke="#E7DED3"/>
    <text x="501" y="353" text-anchor="middle" class="t" font-size="10">Editar</text>
    <text x="552" y="356" class="m" font-size="16">⋯</text>
  </g>
  <text x="40" y="418" class="m xs">… resto de la semana (Jue–Dom)</text>

  <!-- ===== panel lateral sticky: Nueva clase ===== -->
  <rect x="640" y="116" width="320" height="520" rx="16" class="card"/>
  <text x="664" y="150" class="t sm big">Nueva clase</text>

  <!-- toggle Única / Recurrente -->
  <rect x="664" y="166" width="272" height="40" rx="10" fill="#F0E9E0"/>
  <rect x="668" y="170" width="134" height="32" rx="8" fill="#C8775A"/>
  <text x="735" y="190" text-anchor="middle" class="w xs big">Única</text>
  <text x="869" y="190" text-anchor="middle" class="m xs">Recurrente</text>

  <!-- campos comunes -->
  <text x="664" y="232" class="m xs">Nombre</text>
  <rect x="664" y="240" width="272" height="34" rx="8" fill="#fff" stroke="#E7DED3"/>
  <text x="664" y="296" class="m xs">Instructor</text>
  <rect x="664" y="304" width="272" height="34" rx="8" fill="#fff" stroke="#E7DED3"/>

  <!-- cupo stepper + duración -->
  <text x="664" y="362" class="m xs">Cupo</text>
  <rect x="664" y="370" width="34" height="34" rx="8" fill="#fff" stroke="#E7DED3"/>
  <text x="681" y="392" text-anchor="middle" class="t">−</text>
  <rect x="700" y="370" width="56" height="34" rx="8" fill="#fff" stroke="#E7DED3"/>
  <text x="728" y="392" text-anchor="middle" class="t sm">8</text>
  <rect x="758" y="370" width="34" height="34" rx="8" fill="#fff" stroke="#E7DED3"/>
  <text x="775" y="392" text-anchor="middle" class="t">+</text>
  <text x="812" y="362" class="m xs">Duración</text>
  <rect x="812" y="370" width="124" height="34" rx="8" fill="#fff" stroke="#E7DED3"/>
  <text x="824" y="392" class="m xs">60 min</text>

  <!-- recurrente: días + hora (se muestran si recurrente) -->
  <text x="664" y="430" class="m xs">Días (recurrente)</text>
  <g font-size="11">
    <rect x="664" y="438" width="34" height="34" rx="17" fill="#C8775A"/><text x="681" y="460" text-anchor="middle" class="w">L</text>
    <rect x="703" y="438" width="34" height="34" rx="17" fill="#fff" stroke="#E7DED3"/><text x="720" y="460" text-anchor="middle" class="t">M</text>
    <rect x="742" y="438" width="34" height="34" rx="17" fill="#C8775A"/><text x="759" y="460" text-anchor="middle" class="w">M</text>
    <rect x="781" y="438" width="34" height="34" rx="17" fill="#fff" stroke="#E7DED3"/><text x="798" y="460" text-anchor="middle" class="t">J</text>
    <rect x="820" y="438" width="34" height="34" rx="17" fill="#C8775A"/><text x="837" y="460" text-anchor="middle" class="w">V</text>
    <rect x="859" y="438" width="34" height="34" rx="17" fill="#fff" stroke="#E7DED3"/><text x="876" y="460" text-anchor="middle" class="t">S</text>
    <rect x="898" y="438" width="34" height="34" rx="17" fill="#fff" stroke="#E7DED3"/><text x="915" y="460" text-anchor="middle" class="t">D</text>
  </g>
  <text x="664" y="498" class="m xs">Hora</text>
  <rect x="664" y="506" width="130" height="34" rx="8" fill="#fff" stroke="#E7DED3"/>
  <text x="676" y="528" class="m xs">18:00</text>
  <text x="664" y="560" class="m" font-size="10">Se crea una clase cada semana en los días elegidos.</text>

  <!-- footer -->
  <rect x="664" y="584" width="180" height="40" rx="10" fill="#C8775A"/>
  <text x="754" y="609" text-anchor="middle" class="w sm big">Crear clase</text>
  <rect x="852" y="584" width="84" height="40" rx="10" fill="#fff" stroke="#E7DED3"/>
  <text x="894" y="609" text-anchor="middle" class="t sm">Cancelar</text>

  <text x="500" y="666" text-anchor="middle" class="m" font-size="9">wireframe low-fi · no es diseño final · status draft-for-owner-review</text>
</svg>
